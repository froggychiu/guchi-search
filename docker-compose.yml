services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GUCHI_DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/guchi_search
      - GUCHI_DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/guchi_search
      - GUCHI_MEILISEARCH_URL=http://meilisearch:7700
      - GUCHI_MEILISEARCH_API_KEY=${MEILISEARCH_API_KEY:-}
      - GUCHI_OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guchi_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-masterkey123}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

volumes:
  postgres_data:
  meilisearch_data:
